<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ProPlayHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="navbar-brand">ProPlay<span>Hub</span></a>
    <ul class="navbar-links"></ul>
    <div class="navbar-actions">
      <a href="register.html" class="btn btn-primary btn-sm">Register</a>
    </div>
  </div>
</nav>

<main>
  <div class="form-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to your ProPlayHub account</p>

    <div id="alert-area"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label>Username <span class="required">*</span></label>
        <input type="text" id="username" class="form-control" placeholder="Your username">
        <div class="field-error" id="err-username"></div>
      </div>

      <div class="form-group">
        <label>Password <span class="required">*</span></label>
        <input type="password" id="password" class="form-control" placeholder="Your password">
        <div class="field-error" id="err-password"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Login</button>
    </form>

    <p class="text-center mt-2 text-muted" style="font-size:0.85rem;">
      No account? <a href="register.html">Register here</a>
    </p>
  </div>
</main>

<footer class="footer"><div class="container">© 2025 ProPlayHub</div></footer>

<script src="auth.js"></script>
<script>
  requireGuest();

  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    // clear errors
    ['username','password'].forEach(id => {
      document.getElementById('err-' + id).classList.remove('show');
      document.getElementById(id).classList.remove('is-invalid');
    });
    document.getElementById('alert-area').innerHTML = '';

    if (!username) {
      document.getElementById('err-username').textContent = 'Please enter your username.';
      document.getElementById('err-username').classList.add('show');
      document.getElementById('username').classList.add('is-invalid');
      return;
    }
    if (!password) {
      document.getElementById('err-password').textContent = 'Please enter your password.';
      document.getElementById('err-password').classList.add('show');
      document.getElementById('password').classList.add('is-invalid');
      return;
    }

    const result = login(username, password);
    if (result.ok) {
      window.location.href = 'account.html';
    } else {
      document.getElementById('alert-area').innerHTML =
        `<div class="alert alert-danger">${result.msg}</div>`;
    }
  });
</script>
<script src="chat.js"></script>
</body>
</html>
