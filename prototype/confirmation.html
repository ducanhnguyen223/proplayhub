<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Successful — ProPlayHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="navbar-brand">ProPlay<span>Hub</span></a>
  </div>
</nav>

<main>
  <div class="form-card text-center" style="max-width:500px;">
    <div style="font-size:3.5rem; margin-bottom:0.75rem;">🎉</div>
    <h1 style="color:var(--success);">Registration Successful!</h1>
    <p class="text-muted mt-1">Welcome to ProPlayHub, <strong id="display-name">Gamer</strong>!</p>

    <div class="alert alert-info mt-3" style="text-align:left;">
      <strong>📧 Email Confirmation Sent</strong><br>
      A confirmation email has been sent to <span id="display-email" style="font-weight:700;"></span>.<br>
      <span style="font-size:0.82rem; opacity:0.8;">(Simulated — no real email is sent in this prototype)</span>
    </div>

    <div class="card mt-3" style="text-align:left;">
      <div class="card-title">Your Account Summary</div>
      <div class="profile-row"><span class="label">Username</span><span class="value" id="sum-username">—</span></div>
      <div class="profile-row"><span class="label">Email</span><span class="value" id="sum-email">—</span></div>
      <div class="profile-row"><span class="label">Location</span><span class="value" id="sum-location">—</span></div>
      <div class="profile-row"><span class="label">Platform</span><span class="value" id="sum-platform">—</span></div>
      <div class="profile-row"><span class="label">Payment</span><span class="value" id="sum-payment">—</span></div>
    </div>

    <div class="mt-3 flex-center gap-2">
      <a href="login.html" class="btn btn-primary btn-lg">Login Now</a>
      <a href="packages.html" class="btn btn-outline">View Packages</a>
    </div>
  </div>
</main>

<footer class="footer"><div class="container">© 2025 ProPlayHub</div></footer>

<script src="auth.js"></script>
<script>
  const user = getUser();
  if (user) {
    document.getElementById('display-name').textContent  = user.username;
    document.getElementById('display-email').textContent = user.email;
    document.getElementById('sum-username').textContent  = user.username;
    document.getElementById('sum-email').textContent     = user.email;
    document.getElementById('sum-location').textContent  = user.location;
    document.getElementById('sum-platform').textContent  = user.platform;
    document.getElementById('sum-payment').textContent   = user.paymentMethod;
  }
</script>
<script src="chat.js"></script>
</body>
</html>
